<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乡行共创 · AI乡村文旅规划台</title>
<link rel="preconnect" href="https://images.unsplash.com">
<link rel="stylesheet" href="./styles.css">
  <script src="./vendor/lucide/lucide.min.js" defer></script>
<script src="./data.js" defer></script>
<script src="./services.js" defer></script>
<script src="./client.js" defer></script>
</head>
<body>
  <header class="topbar">
    <button class="brand" data-view="planner" aria-label="回到规划台">
      <span class="brand-mark">乡</span>
      <span>
        <strong>乡行共创</strong>
        <small>AI乡村文旅规划台</small>
      </span>
    </button>
    <nav class="main-nav" aria-label="主导航">
      <button class="nav-btn" data-view="planner"><i data-lucide="route"></i><span>规划台</span></button>
      <button class="nav-btn" data-view="villages"><i data-lucide="map"></i><span>村镇库</span></button>
      <button class="nav-btn" data-view="resources"><i data-lucide="warehouse"></i><span>资源匹配</span></button>
      <button class="nav-btn" data-view="bookings"><i data-lucide="clipboard-list"></i><span>需求记录</span></button>
      <button class="nav-btn" data-view="evidence"><i data-lucide="chart-no-axes-combined"></i><span>数据依据</span></button>
      <a class="nav-link-btn" id="submissionPortalLink" href="http://127.0.0.1:5184/" target="_blank" rel="noopener"><i data-lucide="file-plus-2"></i><span>入库申报</span></a>
    </nav>
  </header>

  <main id="app" class="app-shell" aria-live="polite"></main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="modalRoot"></div>
</body>
</html>
